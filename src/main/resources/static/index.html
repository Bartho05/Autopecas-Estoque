<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="row mb-4">

    <div class="col">
        <div class="card p-3">
            <h5>Total de Produtos</h5>
            <h3 id="totalProdutos">0</h3>
        </div>
    </div>

    <div class="col">
        <div class="card p-3">
            <h5>Itens em Estoque</h5>
            <h3 id="totalEstoque">0</h3>
        </div>
    </div>

</div>

<div class="container mt-5">

    <h1 class="mb-4">Sistema de Estoque de Autopeças</h1>

    <div class="card p-4 mb-4">

        <h4>Cadastrar Produto</h4>

        <div class="row">

            <div class="col">
                <input id="nome" class="form-control" placeholder="Nome">
            </div>

            <div class="col">
                <input id="descricao" class="form-control" placeholder="Descrição">
            </div>

            <div class="col">
                <input id="categoria" class="form-control" placeholder="Categoria">
            </div>

            <div class="col">
                <input id="marca" class="form-control" placeholder="Marca">
            </div>

            <div class="col">
                <input id="codigo" class="form-control" placeholder="Código">
            </div>

            <div class="col">
                <input id="preco" class="form-control" placeholder="Preço">
            </div>

            <div class="col">
                <input id="quantidade" class="form-control" placeholder="Quantidade">
            </div>

            <div class="col">
                <button class="btn btn-primary" onclick="cadastrarProduto()">Cadastrar</button>
            </div>

        </div>

    </div>

    <div class="card p-4">

        <h4>Estoque</h4>

        <table class="table table-striped">

            <thead>

            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Marca</th>
                <th>Código</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Ações</th>
            </tr>

            </thead>

            <tbody id="tabelaProdutos"></tbody>

        </table>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
